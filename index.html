<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trackr">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d12">
<meta name="description" content="Personal gym weight tracker">
<!--
  MANIFEST — create manifest.json in your repo root:
  {
    "name":"Trackr","short_name":"Trackr","start_url":"./","display":"standalone",
    "orientation":"portrait","background_color":"#0d0d12","theme_color":"#0d0d12",
    "icons":[
      {"src":"icon-192.png","sizes":"192x192","type":"image/png","purpose":"any maskable"},
      {"src":"icon-512.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}
    ]
  }
-->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" href="icon-192.png">
<title>Trackr</title>
<!-- Material Symbols Rounded — consistent icon pack -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
<style>
/* ══ MATERIAL ICON BASE ══════════════════════════════════════════════════ */
.mi {
  font-family: 'Material Symbols Rounded';
  font-weight: 400; font-style: normal; font-size: 20px; line-height: 1;
  display: inline-flex; align-items: center; justify-content: center;
  letter-spacing: normal; text-transform: none; white-space: nowrap;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'liga'; user-select: none; pointer-events: none;
  flex-shrink: 0;
}

/* ══ TOKENS ══════════════════════════════════════════════════════════════ */
:root {
  --safe-t: env(safe-area-inset-top,  0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --r-card: 20px; --r-sm: 14px; --r-pill: 100px; --r-sheet: 28px;
  --dur: 0.26s; --ease: cubic-bezier(0.32,0.72,0,1);
  --accent:    #7b8cde;
  --accent-s:  rgba(123,140,222,0.14);
  --accent-b:  rgba(123,140,222,0.22);
  --label-color: #5e5e78;
}
[data-theme="dark"] {
  --bg:#0d0d12; --bg2:#13131a;
  --surface:#1a1a24; --surface2:#22222e; --surface3:#2c2c3a;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#eaeaf5; --text-2:#9898b8; --text-3:#5e5e78;
  --red:#f07070;   --red-s:rgba(240,112,112,0.12);
  --amber:#e8a14e; --amber-s:rgba(232,161,78,0.13);
  --green:#5ec97a; --green-s:rgba(94,201,122,0.13);
  --overlay:rgba(0,0,0,0.6); --blur-bg:rgba(13,13,18,0.9);
  --shadow:0 4px 24px rgba(0,0,0,0.45); --shadow-sm:0 2px 10px rgba(0,0,0,0.3);
}
[data-theme="light"] {
  --bg:#f0f0f7; --bg2:#e8e8f2;
  --surface:#fff; --surface2:#f5f5fc; --surface3:#ebebf5;
  --border:rgba(0,0,0,0.06); --border2:rgba(0,0,0,0.1);
  --text:#18182a; --text-2:#7070a0; --text-3:#b0b0d0;
  --red:#d94f4f;   --red-s:rgba(217,79,79,0.09);
  --amber:#b07020; --amber-s:rgba(176,112,32,0.1);
  --green:#2e9e52; --green-s:rgba(46,158,82,0.1);
  --overlay:rgba(0,0,0,0.35); --blur-bg:rgba(240,240,247,0.92);
  --shadow:0 4px 24px rgba(80,80,140,0.1); --shadow-sm:0 2px 8px rgba(80,80,140,0.07);
}

/* ══ RESET ═══════════════════════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:-apple-system,'SF Pro Rounded','SF Pro Text',sans-serif; background:var(--bg); color:var(--text); min-height:100dvh; overflow-x:hidden; overscroll-behavior:none; transition:background var(--dur),color var(--dur); }
button { font-family:inherit; cursor:pointer; }
input, select { font-family:inherit; }

/* ══ HEADER ══════════════════════════════════════════════════════════════ */
.header {
  position:sticky; top:0; z-index:60;
  padding:calc(var(--safe-t) + 16px) 14px 13px;
  background:var(--blur-bg);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  transition:background var(--dur);
}
.header-title { flex:1; font-size:24px; font-weight:800; letter-spacing:-0.8px; }
.hbtn {
  position:relative; width:36px; height:36px; border-radius:50%;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text-2); display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all 0.2s;
}
.hbtn.on { background:var(--accent-s); border-color:var(--accent-b); color:var(--accent); }
.hbtn:active { transform:scale(0.9); }
.hbtn-dot {
  position:absolute; top:2px; right:2px;
  width:8px; height:8px; border-radius:50%;
  border:1.5px solid var(--bg); display:none;
}
.hbtn-dot.show   { display:block; }
.hbtn-dot.synced { background:var(--green); }
.hbtn-dot.syncing{ background:var(--amber); animation:pulse 1s infinite; }
.hbtn-dot.error  { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

/* ══ TABS ════════════════════════════════════════════════════════════════ */
.tabs-bar {
  position:sticky; top:calc(var(--safe-t) + 65px); z-index:50;
  background:var(--blur-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex; overflow-x:auto; scrollbar-width:none; padding:0 14px;
  transition:background var(--dur);
}
.tabs-bar::-webkit-scrollbar { display:none; }
.tab { flex-shrink:0; padding:11px 15px 10px; background:none; border:none; border-bottom:2.5px solid transparent; color:var(--text-3); font-size:14px; font-weight:700; transition:color 0.2s,border-color 0.2s; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ══ EDIT BANNER ══════════════════════════════════════════════════════════ */
.edit-banner { display:none; background:var(--amber-s); border-bottom:1px solid rgba(232,161,78,0.18); padding:8px 18px; font-size:12px; font-weight:700; letter-spacing:0.3px; color:var(--amber); text-align:center; }
body.em .edit-banner { display:block; }

/* ══ SCROLL CONTENT ═══════════════════════════════════════════════════════ */
.scroll-content { padding:8px 0 calc(var(--safe-b) + 60px); }

/* ══ SECTION HEAD ══════════════════════════════════════════════════════════ */
.section-head { display:flex; align-items:center; padding:18px 22px 8px; gap:4px; }
.section-name { font-size:11px; font-weight:800; letter-spacing:1.1px; text-transform:uppercase; color:var(--label-color); flex:1; }
.sec-act-btn { display:none; background:none; border:none; padding:5px; border-radius:50%; line-height:1; transition:background 0.15s; }
.sec-rename { color:var(--accent); } .sec-rename:active { background:var(--accent-s); }
.sec-delete { color:var(--red); }    .sec-delete:active { background:var(--red-s); }
body.em .sec-act-btn { display:flex; align-items:center; }

/* ══ CARD ══════════════════════════════════════════════════════════════════ */
.card { margin:0 14px 6px; background:var(--surface); border-radius:var(--r-card); border:1px solid var(--border); overflow:hidden; box-shadow:var(--shadow-sm); transition:background var(--dur); }

/* ══ EXERCISE ROW ══════════════════════════════════════════════════════════ */
.ex-row { display:flex; align-items:center; padding:0 14px; height:52px; gap:10px; cursor:pointer; position:relative; transition:background 0.14s; }
.ex-row:not(:last-child)::after { content:''; position:absolute; bottom:0; left:50px; right:0; height:1px; background:var(--border); }
.ex-row:active { background:var(--surface2); }
.ex-del { display:none; flex-shrink:0; width:26px; height:26px; border-radius:50%; background:var(--red); border:none; color:#fff; align-items:center; justify-content:center; transition:transform 0.15s; }
.ex-del:active { transform:scale(0.86); }
body.em .ex-del { display:flex; }
.ex-name { flex:1; font-size:15px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ex-kg { font-size:15px; font-weight:800; color:var(--accent); white-space:nowrap; min-width:56px; text-align:right; letter-spacing:-0.3px; }
body.em .ex-kg { display:none; }
.ex-chev { color:var(--text-3); display:flex; align-items:center; }
body.em .ex-chev { display:none; }
.ex-edit-pill { display:none; flex-shrink:0; background:var(--surface2); border:1px solid var(--border2); border-radius:50%; color:var(--text-2); width:30px; height:30px; align-items:center; justify-content:center; transition:background 0.14s; }
.ex-edit-pill:active { background:var(--surface3); }
body.em .ex-edit-pill { display:flex; }

.add-ex-row { display:none; align-items:center; padding:0 16px; height:44px; gap:8px; cursor:pointer; color:var(--accent); font-size:14px; font-weight:700; border-top:1px dashed var(--border2); transition:background 0.14s; }
.add-ex-row:active { background:var(--accent-s); }
body.em .add-ex-row { display:flex; }
.add-cat-row { display:none; align-items:center; margin:4px 14px; padding:13px 16px; gap:8px; cursor:pointer; color:var(--accent); font-size:14px; font-weight:700; background:var(--surface); border:1.5px dashed var(--border2); border-radius:var(--r-card); transition:background 0.15s,border-color 0.15s; }
.add-cat-row:active { background:var(--accent-s); border-color:var(--accent); }
body.em .add-cat-row { display:flex; }

/* ══ SETTINGS PANEL ════════════════════════════════════════════════════════ */
.settings-panel {
  position:fixed; inset:0; background:var(--bg); z-index:70;
  transform:translateX(100%); transition:transform 0.35s var(--ease);
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.settings-panel.open { transform:translateX(0); }
.sp-header {
  position:sticky; top:0; z-index:5;
  padding:calc(var(--safe-t) + 16px) 14px 13px;
  background:var(--blur-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
}
.sp-back { background:none; border:none; color:var(--accent); font-size:16px; font-weight:700; padding:4px; display:flex; align-items:center; gap:2px; }
.sp-back:active { opacity:0.7; }
.sp-title { flex:1; font-size:20px; font-weight:800; letter-spacing:-0.5px; }
.sp-body { padding:8px 0 calc(var(--safe-b) + 40px); }

.sp-section { margin:22px 14px 0; }
.sp-section-title { font-size:11px; font-weight:800; letter-spacing:1.1px; text-transform:uppercase; color:var(--label-color); padding:0 4px 9px; display:block; }
.sp-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-card); overflow:hidden; box-shadow:var(--shadow-sm); }
.sp-row { display:flex; align-items:center; padding:14px 16px; gap:12px; min-height:50px; transition:background 0.14s; }
.sp-row:not(:last-child) { border-bottom:1px solid var(--border); }
.sp-row:active { background:var(--surface2); }
.sp-row-icon { display:flex; align-items:center; justify-content:center; width:22px; flex-shrink:0; color:var(--text-2); }
.sp-row-label { flex:1; font-size:15px; font-weight:500; color:var(--text); }

/* Swatch pickers */
.swatch-section { padding:14px 16px; }
.swatch-section + .swatch-section, .sp-row + .swatch-section { border-top:1px solid var(--border); }
.swatch-label { font-size:11px; font-weight:800; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-3); margin-bottom:10px; display:block; }
.swatch-row { display:flex; gap:10px; flex-wrap:wrap; }
.swatch { width:30px; height:30px; border-radius:50%; border:2.5px solid transparent; cursor:pointer; transition:transform 0.15s,border-color 0.15s; flex-shrink:0; }
.swatch.active { border-color:var(--text); transform:scale(1.18); }
.swatch:active { transform:scale(0.92); }

/* Toggles */
.theme-toggle, .unit-toggle { display:flex; background:var(--surface2); border-radius:10px; padding:3px; gap:2px; }
.theme-opt, .unit-opt { flex:1; padding:7px 12px; border-radius:8px; font-size:14px; font-weight:700; border:none; background:none; color:var(--text-2); transition:all 0.2s; text-align:center; }
.theme-opt.active, .unit-opt.active { background:var(--surface); color:var(--accent); box-shadow:0 1px 4px rgba(0,0,0,0.15); }

/* Day management */
.day-manage-row { display:flex; align-items:center; padding:13px 16px; gap:10px; }
.day-manage-row + .day-manage-row { border-top:1px solid var(--border); }
.day-manage-name { flex:1; font-size:15px; font-weight:500; }
.day-rename-btn { display:flex; align-items:center; gap:4px; background:none; border:none; color:var(--accent); font-size:13px; font-weight:700; padding:5px 8px; border-radius:var(--r-pill); }
.day-rename-btn:active { background:var(--accent-s); }
.day-delete-btn { width:26px; height:26px; border-radius:50%; background:var(--red); border:none; color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.day-delete-btn:active { transform:scale(0.88); }
.add-day-btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:13px 16px; color:var(--accent); font-size:14px; font-weight:700; background:none; border:none; border-top:1px dashed var(--border2); width:100%; transition:background 0.14s; }
.add-day-btn:active { background:var(--accent-s); }

/* Supabase config */
.supa-status { display:flex; align-items:center; gap:10px; padding:14px 16px; }
.supa-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.supa-dot.green { background:var(--green); }
.supa-dot.gray  { background:var(--text-3); }
.supa-dot.pulse { background:var(--amber); animation:pulse 1s infinite; }
.supa-status-text { flex:1; font-size:15px; font-weight:500; }
.supa-toggle-btn { background:none; border:none; color:var(--accent); font-size:13px; font-weight:700; padding:5px 10px; border-radius:var(--r-pill); }
.supa-toggle-btn:active { background:var(--accent-s); }
.supa-form { padding:0 16px 14px; display:flex; flex-direction:column; gap:8px; }
.supa-form.hidden { display:none; }
.cfg-input {
  width:100%; background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--r-sm); padding:10px 14px; color:var(--text);
  font-size:13px; font-weight:500; outline:none;
  -webkit-appearance:none; appearance:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.cfg-input::placeholder { color:var(--text-3); }
.cfg-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-s); }
.cfg-save-btn { background:var(--accent); border:none; border-radius:var(--r-sm); color:#fff; font-size:14px; font-weight:700; padding:11px; transition:opacity 0.15s; }
.cfg-save-btn:active { opacity:0.8; }
.cfg-status { font-size:12px; font-weight:600; text-align:center; }
.cfg-status.ok  { color:var(--green); }
.cfg-status.err { color:var(--red); }

/* Settings action buttons */
.sp-action-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px 16px; background:none; border:none; font-size:15px; font-weight:600; transition:background 0.14s; color:var(--text); }
.sp-action-btn:active { background:var(--surface2); }
.sp-action-btn.danger { color:var(--red); }
.sp-action-btn.accent { color:var(--accent); }
.sp-action-btn + .sp-action-btn { border-top:1px solid var(--border); }

/* ══ OVERLAYS ════════════════════════════════════════════════════════════ */
.overlay { display:none; position:fixed; inset:0; z-index:100; background:var(--overlay); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
.overlay.open { display:flex; }
.sheet-wrap { align-items:flex-end; justify-content:center; }
.sheet { width:100%; max-width:500px; background:var(--surface); border-radius:var(--r-sheet) var(--r-sheet) 0 0; border:1px solid var(--border); border-bottom:none; padding-bottom:calc(var(--safe-b) + 10px); animation:sheetUp var(--dur) var(--ease); }
@keyframes sheetUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
.sheet-grip { width:40px; height:5px; border-radius:3px; background:var(--border2); margin:13px auto 0; }
.sheet-hdr { display:flex; align-items:center; padding:13px 18px 0; gap:8px; }
.sheet-title { flex:1; text-align:center; font-size:17px; font-weight:800; letter-spacing:-0.3px; }
.sheet-cancel { background:none; border:none; color:var(--text-2); font-size:16px; padding:4px; min-width:56px; }
.sheet-done { background:none; border:none; color:var(--accent); font-size:16px; font-weight:800; padding:4px; min-width:56px; text-align:right; }

/* ══ PICKER ══════════════════════════════════════════════════════════════ */
.picker-wrap { position:relative; height:220px; overflow:hidden; margin-top:16px; }
.picker-fade { position:absolute; left:0; right:0; z-index:2; height:80px; pointer-events:none; }
.picker-fade.t { top:0;    background:linear-gradient(to bottom,var(--surface),transparent); }
.picker-fade.b { bottom:0; background:linear-gradient(to top,   var(--surface),transparent); }
.picker-sel { position:absolute; top:50%; transform:translateY(-50%); left:14px; right:14px; height:44px; border-top:1px solid var(--border2); border-bottom:1px solid var(--border2); border-radius:var(--r-sm); background:var(--accent-s); pointer-events:none; z-index:1; }
.picker-cols { display:flex; height:100%; }
.pc-wrap { display:flex; flex-direction:column; overflow:hidden; }
.pc-wrap.kg  { flex:1; }
.pc-wrap.dec { width:88px; }
.pc-lbl { text-align:center; font-size:10px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--text-3); padding:5px 0 2px; flex-shrink:0; }
.pc { flex:1; overflow-y:scroll; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; scrollbar-width:none; overscroll-behavior:contain; }
.pc::-webkit-scrollbar { display:none; }
.pi { height:44px; display:flex; align-items:center; justify-content:center; scroll-snap-align:center; font-size:22px; font-weight:300; color:var(--text); flex-shrink:0; user-select:none; }
.pi.sp { opacity:0; pointer-events:none; }

.manual-row { display:flex; align-items:center; gap:10px; padding:13px 18px 8px; }
.manual-label { font-size:13px; color:var(--text-2); white-space:nowrap; }
.manual-input { flex:1; background:var(--surface2); border:1.5px solid var(--border); border-radius:var(--r-sm); padding:10px 14px; color:var(--text); font-size:17px; font-weight:600; outline:none; -webkit-appearance:none; appearance:none; transition:border-color 0.2s,box-shadow 0.2s; }
.manual-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-s); }
.manual-unit { font-size:14px; color:var(--text-2); font-weight:600; min-width:28px; }
.adj-row { display:flex; align-items:center; gap:6px; padding:4px 18px 12px; overflow-x:auto; scrollbar-width:none; }
.adj-row::-webkit-scrollbar { display:none; }
.adj-lbl { font-size:12px; color:var(--text-3); flex-shrink:0; }
.adj { flex-shrink:0; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:13px; font-weight:700; padding:6px 10px; transition:background 0.14s,color 0.14s; }
.adj:active { background:var(--accent-s); color:var(--accent); }

/* ══ ACTION LIST ══════════════════════════════════════════════════════════ */
.action-list { padding:10px 14px 2px; display:flex; flex-direction:column; gap:8px; }
.act { display:flex; align-items:center; gap:14px; padding:13px 16px; background:var(--surface2); border-radius:16px; border:none; font-size:15px; font-weight:600; color:var(--text); text-align:left; width:100%; transition:background 0.14s; }
.act:active { background:var(--surface3); }
.act.danger { color:var(--red); }
.act-icon { display:flex; align-items:center; justify-content:center; width:22px; flex-shrink:0; }
.move-list { padding:10px 14px 2px; overflow-y:auto; max-height:44vh; display:flex; flex-direction:column; gap:8px; }
.move-item { display:flex; align-items:center; padding:13px 16px; background:var(--surface2); border-radius:16px; cursor:pointer; font-size:15px; font-weight:600; color:var(--text); transition:background 0.14s; }
.move-item:active { background:var(--accent-s); }
.move-day-tag { margin-left:auto; font-size:12px; font-weight:700; color:var(--accent); background:var(--accent-s); border-radius:var(--r-pill); padding:3px 10px; flex-shrink:0; }

/* ══ CENTER MODALS ════════════════════════════════════════════════════════ */
.center-wrap { align-items:center; justify-content:center; padding:22px; }
.modal-box { width:100%; max-width:340px; background:var(--surface); border:1px solid var(--border2); border-radius:24px; padding:24px 20px 20px; box-shadow:var(--shadow); animation:popIn var(--dur) var(--ease); }

.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ════════════════════════════════════════════════════════════════════════════
   SERVICE WORKER
════════════════════════════════════════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  try {
    const SW = `const C='trackr-v2',H=[self.location.href];
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(H)).then(()=>self.skipWaiting()));});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(m=>{if(m)return m;return fetch(e.request).then(r=>{if(!r||r.status!==200)return r;const c=r.clone();caches.open(C).then(cc=>cc.put(e.request,c));return r;}).catch(()=>caches.match(e.request));}));});`;
    const swUrl = URL.createObjectURL(new Blob([SW], {type:'text/javascript'}));
    navigator.serviceWorker.register(swUrl, {scope:'./'}).then(()=>URL.revokeObjectURL(swUrl)).catch(()=>{});
  } catch(e) {}
}

/* ════════════════════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════════════════════ */
const SK = 'trackr_v1';
let S = {};

function loadLocal() {
  try {
    const raw = localStorage.getItem(SK);
    S = raw ? JSON.parse(raw) : defaultState();
    if (!S.days)         S.days         = defaultState().days;
    if (!S.cats)         S.cats         = defaultState().cats;
    if (!S.exs)          S.exs          = defaultState().exs;
    if (!S.theme)        S.theme        = 'dark';
    if (!S.accentPreset) S.accentPreset = 'indigo';
    if (!S.labelDark)    S.labelDark    = LABEL_DARK[0];
    if (!S.labelLight)   S.labelLight   = LABEL_LIGHT[0];
    if (!S.unit)         S.unit         = 'kg';
    if (!S.activeDay || !S.days.find(d=>d.id===S.activeDay)) S.activeDay = S.days[0]?.id || 'd1';
  } catch(e) { S = defaultState(); }
}
function saveLocal() { try { localStorage.setItem(SK, JSON.stringify(S)); } catch(e) {} }
function save() { saveLocal(); supaSave(S); }

/* ════════════════════════════════════════════════════════════════════════════
   UNITS
════════════════════════════════════════════════════════════════════════════ */
function fmtWeight(kg) {
  const n = parseFloat(kg) || 0;
  if (S.unit === 'lbs') { const v = n*2.20462; return (v ? parseFloat(v.toFixed(1)) : 0) + ' lbs'; }
  return (n ? (n%1===0 ? n : parseFloat(n.toFixed(2))) : 0) + ' kg';
}
function toKg(val) {
  const n = parseFloat(val) || 0;
  return S.unit === 'lbs' ? Math.max(0, Math.round((n/2.20462)*100)/100) : Math.max(0, Math.round(n*4)/4);
}
function fromKg(kg) {
  const n = parseFloat(kg) || 0;
  return S.unit === 'lbs' ? parseFloat((n*2.20462).toFixed(1)) : n;
}

/* ════════════════════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════════════════════ */
let toastT;
function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ════════════════════════════════════════════════════════════════════════════
   APPLY APPEARANCE
════════════════════════════════════════════════════════════════════════════ */
function applyAll() {
  document.documentElement.setAttribute('data-theme', S.theme);
  $('themeMi').textContent = S.theme === 'dark' ? 'light_mode' : 'dark_mode';
  const p = ACCENTS[S.accentPreset] || ACCENTS.indigo;
  const off = S.theme === 'dark' ? 0 : 3;
  const r = document.documentElement.style;
  r.setProperty('--accent',      p[off]);
  r.setProperty('--accent-s',    p[off+1]);
  r.setProperty('--accent-b',    p[off+2]);
  r.setProperty('--label-color', S.theme==='dark' ? (S.labelDark||LABEL_DARK[0]) : (S.labelLight||LABEL_LIGHT[0]));
}

/* ════════════════════════════════════════════════════════════════════════════
   SUPABASE
   Setup: supabase.com → new project → SQL Editor → run:
     create table gym_data (id integer primary key default 1, data jsonb, updated_at timestamptz default now());
     insert into gym_data (id,data) values (1,'{}');
     alter table gym_data enable row level security;
     create policy "allow all" on gym_data for all using (true) with check (true);
   Then Settings → API → copy Project URL + anon key → paste in app Settings.
════════════════════════════════════════════════════════════════════════════ */
const CFG_KEY = 'trackrSupa_v1';
let supaUrl = '', supaKey = '';

function loadCfg() {
  try { const c=JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); supaUrl=c.url||''; supaKey=c.key||''; } catch(e) {}
}
function saveCfg(u,k) { supaUrl=u.trim(); supaKey=k.trim(); try{localStorage.setItem(CFG_KEY,JSON.stringify({url:supaUrl,key:supaKey}));}catch(e){} }
function hasSupa() { return !!(supaUrl && supaKey); }

function setSyncDot(state) {
  const d = $('syncDot');
  d.className = 'hbtn-dot';
  if (state === 'synced')  d.classList.add('show','synced');
  else if (state === 'syncing') d.classList.add('show','syncing');
  else if (state === 'error')   d.classList.add('show','error');
}

async function supaFetch(method, body) {
  if (!hasSupa()) return null;
  try {
    const res = await fetch(supaUrl.replace(/\/$/,'')+'/rest/v1/gym_data?id=eq.1', {
      method,
      headers: {'Content-Type':'application/json','apikey':supaKey,'Authorization':'Bearer '+supaKey,
                'Prefer': method==='GET' ? 'return=representation' : 'return=minimal'},
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    return method === 'GET' ? await res.json() : true;
  } catch(e) { return null; }
}

async function supaLoad() {
  if (!hasSupa() || !navigator.onLine) return null;
  setSyncDot('syncing');
  const rows = await supaFetch('GET');
  if (!rows?.length || !rows[0].data?.exs) { setSyncDot(''); return null; }
  setSyncDot('synced');
  return rows[0].data;
}

let syncTimer;
async function supaSave(state) {
  if (!hasSupa()) { setSyncDot(''); return; }
  clearTimeout(syncTimer);
  setSyncDot('syncing');
  syncTimer = setTimeout(async () => {
    const ok = await supaFetch('PATCH', {data:state, updated_at:new Date().toISOString()});
    ok ? setSyncDot('synced') : (setSyncDot('error'), showToast('⚠ Sync failed — saved locally'));
  }, 1200);
}

async function testSupa(url, key) {
  try {
    const res = await fetch(url.replace(/\/$/,'')+'/rest/v1/gym_data?id=eq.1',
      {headers:{'apikey':key,'Authorization':'Bearer '+key}});
    if (!res.ok) throw new Error('HTTP '+res.status);
    return (await res.json()).length ? 'ok' : 'empty';
  } catch(e) { return 'err:'+e.message; }
}

let supaFormOpen = false;

$('settingsBtn').addEventListener('click', () => { renderSettings(); $('settingsPanel').classList.add('open'); });
$('settingsBack').addEventListener('click', () => $('settingsPanel').classList.remove('open'));

function mkEl(tag, cls) { const e=document.createElement(tag); if(cls)e.className=cls; return e; }

function renderSettings() {
  const body = $('spBody'); body.innerHTML = '';

  // ── Helper: add section + card
  function addSec(title) {
    const s = mkEl('div','sp-section');
    const t = mkEl('div','sp-section-title'); t.textContent = title;
    s.appendChild(t); body.appendChild(s);
    const c = mkEl('div','sp-card'); s.appendChild(c);
    return c;
  }

  /* 1. APPEARANCE */
  const appCard = addSec('Appearance');

  // Theme row
  const themeRow = mkEl('div','sp-row'); appCard.appendChild(themeRow);
  themeRow.innerHTML = `<span class="sp-row-icon">${mi('palette')}</span><span class="sp-row-label">Theme</span>`;
  const tg = mkEl('div','theme-toggle');
  ['Light','Dark'].forEach((lbl,i) => {
    const b = mkEl('button','theme-opt'); b.textContent = lbl;
    if ((i===0&&S.theme==='light')||(i===1&&S.theme==='dark')) b.classList.add('active');
    b.addEventListener('click', () => { S.theme=i===0?'light':'dark'; applyAll(); save(); renderSettings(); });
    tg.appendChild(b);
  });
  themeRow.appendChild(tg);

  // Accent swatches
  const acSec = mkEl('div','swatch-section'); acSec.style.borderTop='1px solid var(--border)'; appCard.appendChild(acSec);
  const acLbl = mkEl('span','swatch-label'); acLbl.textContent='Accent Color'; acSec.appendChild(acLbl);
  const acRow = mkEl('div','swatch-row'); acSec.appendChild(acRow);
  Object.keys(ACCENTS).forEach(key => {
    const sw = mkEl('div','swatch'); sw.style.background=ACCENT_DISPLAY[key];
    if (S.accentPreset===key) sw.classList.add('active');
    sw.addEventListener('click', ()=>{ S.accentPreset=key; applyAll(); save(); renderSettings(); });
    acRow.appendChild(sw);
  });

  // Label swatches
  const lblSec = mkEl('div','swatch-section'); lblSec.style.borderTop='1px solid var(--border)'; appCard.appendChild(lblSec);
  const lblLbl = mkEl('span','swatch-label'); lblLbl.textContent='Section Label Color'; lblSec.appendChild(lblLbl);
  const lblRow = mkEl('div','swatch-row'); lblSec.appendChild(lblRow);
  const palette = S.theme==='dark' ? LABEL_DARK : LABEL_LIGHT;
  const curLabel = S.theme==='dark' ? S.labelDark : S.labelLight;
  palette.forEach(col => {
    const sw = mkEl('div','swatch'); sw.style.background=col;
    if (curLabel===col) sw.classList.add('active');
    sw.addEventListener('click', ()=>{ if(S.theme==='dark')S.labelDark=col; else S.labelLight=col; applyAll(); save(); renderSettings(); });
    lblRow.appendChild(sw);
  });

  /* 2. UNITS */
  const uCard = addSec('Units');
  const uRow = mkEl('div','sp-row'); uCard.appendChild(uRow);
  uRow.innerHTML = `<span class="sp-row-icon">${mi('weight')}</span><span class="sp-row-label">Weight Unit</span>`;
  const ug = mkEl('div','unit-toggle');
  ['kg','lbs'].forEach(u => {
    const b = mkEl('button','unit-opt'); b.textContent=u;
    if (S.unit===u) b.classList.add('active');
    b.addEventListener('click', ()=>{ S.unit=u; save(); renderSettings(); render(); });
    ug.appendChild(b);
  });
  uRow.appendChild(ug);

  /* 3. WORKOUT DAYS */
  const dCard = addSec('Workout Days');
  S.days.forEach(day => {
    const dr = mkEl('div','day-manage-row'); dCard.appendChild(dr);
    const nm = mkEl('span','day-manage-name'); nm.textContent=day.name; dr.appendChild(nm);
    const catIds = S.cats.filter(c=>c.dayId===day.id).map(c=>c.id);
    const badge  = mkEl('span','move-day-tag'); badge.style.fontSize='11px';
    badge.textContent = S.exs.filter(e=>catIds.includes(e.catId)).length+' ex'; dr.appendChild(badge);
    const rb = mkEl('button','day-rename-btn'); rb.innerHTML=mi('edit')+' Rename';
    rb.addEventListener('click', ()=>openTxt('Rename Day',day.name,'',v=>{day.name=v;save();render();renderSettings();}));
    dr.appendChild(rb);
    if (S.days.length > 1) {
      const db = mkEl('button','day-delete-btn'); db.innerHTML=mi('remove');
      db.addEventListener('click', ()=>{
        const cids=S.cats.filter(c=>c.dayId===day.id).map(c=>c.id);
        const exN=S.exs.filter(e=>cids.includes(e.catId)).length;
        openConfirm(`Delete "${day.name}"?`,
          `Also removes ${S.cats.filter(c=>c.dayId===day.id).length} categories and ${exN} exercises.`,
          ()=>{ S.cats=S.cats.filter(c=>c.dayId!==day.id); S.exs=S.exs.filter(e=>!cids.includes(e.catId));
                S.days=S.days.filter(d=>d.id!==day.id);
                if(S.activeDay===day.id) S.activeDay=S.days[0]?.id||'';
                save(); render(); renderSettings(); });
      });
      dr.appendChild(db);
    }
  });
  const addDayBtn = mkEl('button','add-day-btn'); addDayBtn.innerHTML=mi('add')+' Add Workout Day';
  addDayBtn.addEventListener('click', ()=>openTxt('New Workout Day','','e.g. Upper Body, Cardio…',v=>{
    const id=uid(); S.days.push({id,name:v}); S.activeDay=id; save(); render(); renderSettings();
  }));
  dCard.appendChild(addDayBtn);

  /* 4. CLOUD SYNC */
  const cCard = addSec('Cloud Sync');
  const statusRow = mkEl('div','supa-status'); cCard.appendChild(statusRow);
  const dot = mkEl('span','supa-dot'); dot.classList.add(hasSupa()?'green':'gray');
  const stText = mkEl('span','supa-status-text'); stText.textContent=hasSupa()?'Connected to Supabase':'Not connected';
  const togBtn = mkEl('button','supa-toggle-btn'); togBtn.textContent=supaFormOpen?(hasSupa()?'Hide':'Hide'):(hasSupa()?'Reconfigure':'Configure');
  statusRow.append(dot, stText, togBtn);
  togBtn.addEventListener('click', ()=>{ supaFormOpen=!supaFormOpen; renderSettings(); });

  const form = mkEl('div','supa-form'); if(!supaFormOpen)form.classList.add('hidden'); cCard.appendChild(form);
  const sqlNote = mkEl('div',''); sqlNote.style.cssText='font-size:11px;color:var(--text-3);line-height:1.7;padding:2px 0 8px;';
  sqlNote.innerHTML=`First time? Run in Supabase SQL editor:<br><code style="font-size:10px;background:var(--surface3);padding:6px 8px;border-radius:8px;display:block;margin-top:6px;line-height:1.9;user-select:all;">create table gym_data (id integer primary key default 1, data jsonb, updated_at timestamptz default now());<br>insert into gym_data (id,data) values (1,'{}');<br>alter table gym_data enable row level security;<br>create policy "allow all" on gym_data for all using (true) with check (true);</code>`;
  const urlIn=mkEl('input','cfg-input'); urlIn.type='url'; urlIn.placeholder='https://xxxx.supabase.co'; urlIn.value=supaUrl;
  const keyIn=mkEl('input','cfg-input'); keyIn.type='password'; keyIn.placeholder='anon public key'; keyIn.value=supaKey;
  const saveBtn=mkEl('button','cfg-save-btn'); saveBtn.textContent='Save & Test Connection';
  const stLbl=mkEl('div','cfg-status');
  form.append(sqlNote, urlIn, keyIn, saveBtn, stLbl);

  saveBtn.addEventListener('click', async ()=>{
    const u=urlIn.value.trim(), k=keyIn.value.trim();
    if(!u||!k){stLbl.textContent='Enter both URL and key';stLbl.className='cfg-status err';return;}
    stLbl.textContent='Testing…';stLbl.className='cfg-status';
    const r=await testSupa(u,k);
    if(r==='ok'||r==='empty'){saveCfg(u,k);stLbl.textContent='✓ Connected!';stLbl.className='cfg-status ok';supaSave(S);supaFormOpen=false;setTimeout(renderSettings,800);showToast('✓ Supabase connected');}
    else{stLbl.textContent='✗ '+r;stLbl.className='cfg-status err';}
  });

  if (hasSupa()) {
    const discWrap = mkEl('div',''); discWrap.style.borderTop='1px solid var(--border)'; cCard.appendChild(discWrap);
    const discBtn = mkEl('button','sp-action-btn danger'); discBtn.innerHTML=mi('link_off')+' Disconnect Supabase';
    discBtn.addEventListener('click', ()=>openConfirm('Disconnect Supabase?','Data stays locally. Reconnect anytime.',()=>{saveCfg('','');supaFormOpen=false;setSyncDot('');renderSettings();showToast('Disconnected');}));
    discWrap.appendChild(discBtn);
  }

  /* 5. DATA */
  const dataCard = addSec('Data');
  const expBtn=mkEl('button','sp-action-btn accent'); expBtn.innerHTML=mi('download')+' Export Backup (.json)';
  expBtn.addEventListener('click', exportData); dataCard.appendChild(expBtn);
  const impBtn=mkEl('button','sp-action-btn'); impBtn.innerHTML=mi('upload')+' Import Backup';
  impBtn.addEventListener('click', ()=>$('importFile').click()); dataCard.appendChild(impBtn);
  const rstBtn=mkEl('button','sp-action-btn danger'); rstBtn.innerHTML=mi('restart_alt')+' Reset Everything to Defaults';
  rstBtn.addEventListener('click', ()=>openConfirm('Reset Everything?','All data reverts to defaults (0 kg). Export first if needed.',()=>{S=defaultState();save();exitEdit();applyAll();render();renderSettings();showToast('Reset complete');}));
  dataCard.appendChild(rstBtn);

  const pad=mkEl('div',''); pad.style.height='20px'; body.appendChild(pad);
}

/* ════════════════════════════════════════════════════════════════════════════
   EXPORT / IMPORT
════════════════════════════════════════════════════════════════════════════ */
function exportData() {
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`trackr-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url); showToast('✓ Backup exported');
}
$('importFile').addEventListener('change', e=>{
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader(); r.onload=ev=>{
    try {
      const p=JSON.parse(ev.target.result);
      if(!p.days||!p.cats||!p.exs)throw new Error();
      S=p; if(!S.theme)S.theme='dark'; if(!S.accentPreset)S.accentPreset='indigo';
      if(!S.labelDark)S.labelDark=LABEL_DARK[0]; if(!S.labelLight)S.labelLight=LABEL_LIGHT[0];
      if(!S.unit)S.unit='kg';
      if(!S.activeDay||!S.days.find(d=>d.id===S.activeDay))S.activeDay=S.days[0]?.id||'';
      save(); applyAll(); render();
      if($('settingsPanel').classList.contains('open'))renderSettings();
      showToast('✓ Data restored');
    } catch(e){showToast('✗ Invalid backup file');}
    e.target.value='';
  }; r.readAsText(f);
});

/* ════════════════════════════════════════════════════════════════════════════
   RENDER — TABS + CONTENT
════════════════════════════════════════════════════════════════════════════ */
function render() { renderTabs(); renderContent(); }

function renderTabs() {
  const bar=$('tabsBar'); bar.innerHTML='';
  S.days.forEach(day=>{
    const btn=document.createElement('button'); btn.className='tab'+(day.id===S.activeDay?' active':'');
    btn.textContent=day.name;
    btn.addEventListener('click',()=>{ S.activeDay=day.id; save(); render(); });
    bar.appendChild(btn);
  });
}

function renderContent() {
  const main=$('mainContent'); main.innerHTML='';
  const day=S.days.find(d=>d.id===S.activeDay);
  if(!day){main.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--text-3);font-size:14px;">No workout days yet.<br>Add one in Settings.</div>';return;}

  S.cats.filter(c=>c.dayId===day.id).forEach(cat=>{
    const catExs=S.exs.filter(ex=>ex.catId===cat.id);

    const head=document.createElement('div'); head.className='section-head';
    head.innerHTML=`<span class="section-name">${esc(cat.name)}</span>
      <button class="sec-act-btn sec-rename">${mi('edit')}</button>
      <button class="sec-act-btn sec-delete">${mi('delete')}</button>`;
    head.querySelector('.sec-rename').addEventListener('click',()=>openTxt('Rename Category',cat.name,'',v=>{cat.name=v;save();render();}));
    head.querySelector('.sec-delete').addEventListener('click',()=>{
      const n=S.exs.filter(e=>e.catId===cat.id).length;
      openConfirm(`Delete "${cat.name}"?`,`Also removes ${n} exercise${n!==1?'s':''} inside it.`,
        ()=>{S.cats=S.cats.filter(c=>c.id!==cat.id);S.exs=S.exs.filter(e=>e.catId!==cat.id);save();render();});
    });
    main.appendChild(head);

    const card=document.createElement('div'); card.className='card';
    catExs.forEach(ex=>{
      const row=document.createElement('div'); row.className='ex-row';
      row.innerHTML=`<button class="ex-del">${mi('remove')}</button>
        <span class="ex-name">${esc(ex.name)}</span>
        <span class="ex-kg">${fmtWeight(ex.w)}</span>
        <span class="ex-chev">${mi('chevron_right')}</span>
        <button class="ex-edit-pill">${mi('more_horiz')}</button>`;
      row.querySelector('.ex-del').addEventListener('click',e2=>{
        e2.stopPropagation();
        openConfirm(`Delete "${ex.name}"?`,'Cannot be undone.',()=>{S.exs=S.exs.filter(x=>x.id!==ex.id);save();render();});
      });
      row.querySelector('.ex-edit-pill').addEventListener('click',e2=>{e2.stopPropagation();openActionSheet(ex.id);});
      row.addEventListener('click',e2=>{
        if(e2.target.closest('.ex-del')||e2.target.closest('.ex-edit-pill'))return;
        editMode?openActionSheet(ex.id):openWeightSheet(ex.id);
      });
      card.appendChild(row);
    });
    const aer=document.createElement('div'); aer.className='add-ex-row';
    aer.innerHTML=mi('add')+' Add Exercise';
    aer.addEventListener('click',()=>openAddExModal(cat.id));
    card.appendChild(aer);
    main.appendChild(card);
  });

  const acr=document.createElement('div'); acr.className='add-cat-row';
  acr.innerHTML=mi('create_new_folder')+' Add Category';
  acr.addEventListener('click',()=>openTxt('New Category','','',v=>{S.cats.push({id:uid(),dayId:day.id,name:v});save();render();}));
  main.appendChild(acr);
}

/* ════════════════════════════════════════════════════════════════════════════
   PICKER
════════════════════════════════════════════════════════════════════════════ */
const KG_MAX=300, DECS=[0,0.25,0.5,0.75], DEC_LBLS=['0','.25','.5','.75'], SP=2;
(function buildPicker(){
  const kg=$('pcKg'),dec=$('pcDec'),sp='<div class="pi sp">·</div>';
  let kH='',dH=''; for(let i=0;i<SP;i++){kH+=sp;dH+=sp;}
  for(let i=0;i<=KG_MAX;i++) kH+=`<div class="pi">${i}</div>`;
  DEC_LBLS.forEach(d=>dH+=`<div class="pi">${d}</div>`);
  for(let i=0;i<SP;i++){kH+=sp;dH+=sp;}
  kg.innerHTML=kH; dec.innerHTML=dH;
})();

function setPicker(kg){ const n=Math.max(0,parseFloat(kg)||0),k=Math.min(Math.floor(n),KG_MAX),d=Math.min(Math.round((n-k)*4),3); $('pcKg').scrollTo({top:k*44,behavior:'instant'}); $('pcDec').scrollTo({top:d*44,behavior:'instant'}); }
function getPicker(){ const k=Math.min(Math.round($('pcKg').scrollTop/44),KG_MAX),d=Math.min(Math.round($('pcDec').scrollTop/44),3); return k+DECS[d]; }
let pt; ['pcKg','pcDec'].forEach(id=>$(id).addEventListener('scroll',()=>{clearTimeout(pt);pt=setTimeout(()=>{$('manIn').value=fromKg(getPicker());},80);}));

function buildAdjButtons(){
  const adjRow=$('adjRow'); adjRow.innerHTML='<span class="adj-lbl">±</span>';
  const deltas=S.unit==='lbs'?['-10','-5','-2.5','-1','+1','+2.5','+5','+10']:['-5','-2.5','-1','-0.25','+0.25','+1','+2.5','+5'];
  deltas.forEach(d=>{
    const b=document.createElement('button'); b.className='adj'; b.textContent=(parseFloat(d)>0?'+':'')+d;
    b.addEventListener('click',()=>{const delta=parseFloat(d),cur=parseFloat($('manIn').value)||fromKg(getPicker()),nv=Math.max(0,parseFloat((cur+delta).toFixed(2)));$('manIn').value=nv;setPicker(toKg(nv));});
    adjRow.appendChild(b);
  });
}

/* ════════════════════════════════════════════════════════════════════════════
   WEIGHT SHEET
════════════════════════════════════════════════════════════════════════════ */
let wExId=null; const wSheet=$('wSheet');
function openWeightSheet(exId){
  const ex=S.exs.find(e=>e.id===exId); if(!ex)return;
  wExId=exId; $('wTitle').textContent=ex.name; $('manUnit').textContent=S.unit;
  $('pcKgLbl').textContent='kg'; buildAdjButtons();
  setPicker(ex.w); $('manIn').value=fromKg(ex.w)||'';
  openOverlay(wSheet);
}
function closeWeightSheet(ok){
  if(ok&&wExId){const mv=parseFloat($('manIn').value),stored=isNaN(mv)?getPicker():toKg(mv),ex=S.exs.find(e=>e.id===wExId);if(ex){ex.w=stored;save();render();}}
  closeOverlay(wSheet); wExId=null;
}
$('wCancel').addEventListener('click',()=>closeWeightSheet(false));
$('wDone').addEventListener('click',  ()=>closeWeightSheet(true));
wSheet.addEventListener('click',e=>{if(e.target===wSheet)closeWeightSheet(false);});
$('manIn').addEventListener('input',e=>{const v=parseFloat(e.target.value);if(!isNaN(v)&&v>=0)setPicker(toKg(v));});

/* ════════════════════════════════════════════════════════════════════════════
   ACTION SHEET
════════════════════════════════════════════════════════════════════════════ */
const actSheet=$('actSheet');
function openActionSheet(exId){
  const ex=S.exs.find(e=>e.id===exId); if(!ex)return;
  $('actTitle').textContent=ex.name; const list=$('actList'); list.innerHTML='';
  mkAct(list,'edit',            'Rename',            false, ()=>{closeOverlay(actSheet);openTxt('Rename Exercise',ex.name,'',v=>{ex.name=v;save();render();});});
  mkAct(list,'monitor_weight',  'Update Weight',      false, ()=>{closeOverlay(actSheet);openWeightSheet(exId);});
  mkAct(list,'drive_file_move', 'Move to Category',   false, ()=>{closeOverlay(actSheet);openMoveSheet(exId);});
  mkAct(list,'delete',          'Delete Exercise',    true,  ()=>{closeOverlay(actSheet);openConfirm(`Delete "${ex.name}"?`,'Cannot be undone.',()=>{S.exs=S.exs.filter(x=>x.id!==exId);save();render();});});
  openOverlay(actSheet);
}
function mkAct(p,iconName,label,danger,cb){
  const b=document.createElement('button'); b.className='act'+(danger?' danger':'');
  b.innerHTML=`<span class="act-icon">${mi(iconName)}</span>${label}`;
  b.addEventListener('click',cb); p.appendChild(b);
}
$('actCancel').addEventListener('click',()=>closeOverlay(actSheet));
actSheet.addEventListener('click',e=>{if(e.target===actSheet)closeOverlay(actSheet);});

/* ════════════════════════════════════════════════════════════════════════════
   MOVE SHEET
════════════════════════════════════════════════════════════════════════════ */
const moveSheet=$('moveSheet');
function openMoveSheet(exId){
  const ex=S.exs.find(e=>e.id===exId); if(!ex)return;
  const list=$('moveList'); list.innerHTML='';
  S.cats.forEach(cat=>{
    if(cat.id===ex.catId)return;
    const day=S.days.find(d=>d.id===cat.dayId);
    const item=document.createElement('div'); item.className='move-item';
    item.innerHTML=`${esc(cat.name)}<span class="move-day-tag">${esc(day?.name||'')}</span>`;
    item.addEventListener('click',()=>{ex.catId=cat.id;save();render();closeOverlay(moveSheet);showToast('Moved to '+cat.name);});
    list.appendChild(item);
  });
  openOverlay(moveSheet);
}
$('moveCancel').addEventListener('click',()=>closeOverlay(moveSheet));
moveSheet.addEventListener('click',e=>{if(e.target===moveSheet)closeOverlay(moveSheet);});

   TEXT MODAL
════════════════════════════════════════════════════════════════════════════ */
const txtModal=$('txtModal'); let txtCb=null;
function openTxt(title,val,sub,cb){$('txtTitle').textContent=title;$('txtSub').textContent=sub||'';$('txtIn').value=val;txtCb=cb;openOverlay(txtModal);setTimeout(()=>$('txtIn').focus(),160);}
function closeTxt(ok){if(ok&&txtCb){const v=$('txtIn').value.trim();if(v)txtCb(v);}closeOverlay(txtModal);txtCb=null;}
$('txtOk').addEventListener('click',    ()=>closeTxt(true));
$('txtCancel').addEventListener('click', ()=>closeTxt(false));
txtModal.addEventListener('click',e=>{if(e.target===txtModal)closeTxt(false);});
$('txtIn').addEventListener('keydown',e=>{if(e.key==='Enter')closeTxt(true);});

   ADD EXERCISE MODAL
════════════════════════════════════════════════════════════════════════════ */
const addExModal=$('addExModal');
function openAddExModal(defaultCatId){
  $('addExIn').value=''; const sel=$('addExCat'); sel.innerHTML='';
  S.cats.forEach(cat=>{const day=S.days.find(d=>d.id===cat.dayId);const opt=document.createElement('option');opt.value=cat.id;opt.textContent=cat.name+(day?' · '+day.name:'');if(cat.id===defaultCatId)opt.selected=true;sel.appendChild(opt);});
  openOverlay(addExModal); setTimeout(()=>$('addExIn').focus(),160);
}
function closeAddEx(ok){
  if(ok){const name=$('addExIn').value.trim(),catId=$('addExCat').value;if(name&&catId){S.exs.push({id:uid(),catId,name,w:0});save();render();showToast('Added: '+name);}}
  closeOverlay(addExModal);
}
$('addExOk').addEventListener('click',    ()=>closeAddEx(true));
$('addExCancel').addEventListener('click', ()=>closeAddEx(false));
addExModal.addEventListener('click',e=>{if(e.target===addExModal)closeAddEx(false);});
$('addExIn').addEventListener('keydown',e=>{if(e.key==='Enter')closeAddEx(true);});

const confirmModal=$('confirmModal'); let confCb=null;
function openConfirm(title,text,cb){$('confTitle').textContent=title;$('confText').textContent=text;confCb=cb;openOverlay(confirmModal);}
function closeConfirm(ok){if(ok&&confCb)confCb();closeOverlay(confirmModal);confCb=null;}
$('confOk').addEventListener('click',    ()=>closeConfirm(true));
$('confCancel').addEventListener('click', ()=>closeConfirm(false));
confirmModal.addEventListener('click',e=>{if(e.target===confirmModal)closeConfirm(false);});

function closeOverlay(e) { e.classList.remove('open'); }

/* ════════════════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════════════════ */
async function init() {
  loadCfg(); loadLocal(); applyAll(); render();
  if (hasSupa() && navigator.onLine) {
    const cloud = await supaLoad();
    if (cloud?.exs) {
      S = cloud;
      if (!S.theme)        S.theme='dark';
      if (!S.accentPreset) S.accentPreset='indigo';
      if (!S.labelDark)    S.labelDark=LABEL_DARK[0];
      if (!S.labelLight)   S.labelLight=LABEL_LIGHT[0];
      if (!S.unit)         S.unit='kg';
      if (!S.activeDay||!S.days?.find(d=>d.id===S.activeDay)) S.activeDay=S.days?.[0]?.id||'';
      saveLocal(); applyAll(); render();
    }
  }
}

init();
</script>
</body>
